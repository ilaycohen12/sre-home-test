version: '3.8'

services:

  # ─── TiDB Stack ───────────────────────────────────────────────
  pd:
    image: pingcap/pd:v7.5.0
    container_name: pd
    ports:
      - "2379:2379"
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://pd:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-peer-urls=http://pd:2380
      - --log-level=warn
    volumes:
      - pd-data:/data/pd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2379/pd/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - sre-net

  tikv:
    image: pingcap/tikv:v7.5.0
    container_name: tikv
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data/tikv
      - --pd=pd:2379
      - --log-level=warn
    volumes:
      - tikv-data:/data/tikv
    depends_on:
      pd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20180/metrics"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - sre-net

  tidb:
    image: pingcap/tidb:v7.5.0
    container_name: tidb
    ports:
      - "4000:4000"
      - "10080:10080"
    command:
      - --store=tikv
      - --path=pd:2379
      - --advertise-address=tidb
      - --log-level=warn
    depends_on:
      tikv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10080/status"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - sre-net

  # ─── Kafka Stack ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sre-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - sre-net

  # ─── App Services ─────────────────────────────────────────────
  db-init:
    build: ./db
    container_name: db-init
    environment:
      DB_HOST: tidb
      DB_PORT: 4000
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: sre_app
    depends_on:
      tidb:
        condition: service_healthy
    networks:
      - sre-net
    restart: "no"

  backend:
    build: ./backend
    container_name: backend
    environment:
      DB_HOST: tidb
      DB_PORT: 4000
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: sre_app
      PORT: 3000
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - sre-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sre-net

# ─── Volumes & Networks ───────────────────────────────────────
volumes:
  pd-data:
  tikv-data:

networks:
  sre-net:
    driver: bridge
